<script>
// ============================================================
// 1. МУЛЬТИПЛЕЕРНАЯ СИСТЕМА (WebSocket)
// ============================================================

const WS_URL = `${window.location.protocol === 'https:' ? 'wss:' : 'ws:'}//${window.location.hostname}`;

let ws = null;
let roomCode = '';
let isHost = false;
let myPlayerId = null;
let otherPlayers = {};
let playersInRoom = [];
let gameStarted = false;
let isSpectator = false;

function generateRoomCode() {
    return String(Math.floor(100000 + Math.random() * 900000));
}

function connectToServer() {
    return new Promise((resolve, reject) => {
        try {
            ws = new WebSocket(WS_URL);
            ws.onopen = () => {
                console.log('✅ WebSocket подключен');
                resolve();
            };
            ws.onerror = (err) => {
                console.error('❌ WebSocket ошибка:', err);
                reject(err);
            };
            ws.onclose = () => {
                console.log('🔌 WebSocket отключен');
                if (gameStarted) {
                    showEventText('🔌 Связь потеряна!', 3);
                }
            };
            ws.onmessage = handleWebSocketMessage;
        } catch (e) {
            reject(e);
        }
    });
}

function handleWebSocketMessage(event) {
    try {
        const data = JSON.parse(event.data);
        console.log('📨 Получено:', data.type, data);
        
        switch(data.type) {
            case 'room_created':
                roomCode = data.roomCode;
                myPlayerId = data.playerId;
                isHost = true;
                showLobbyScreen();
                updateLobbyUI(data.players);
                updateRemotePlayers(data.players);
                break;
                
            case 'room_joined':
                roomCode = data.roomCode;
                myPlayerId = data.playerId;
                isHost = false;
                showLobbyScreen();
                updateLobbyUI(data.players);
                updateRemotePlayers(data.players);
                break;
                
            case 'player_joined':
                playersInRoom = data.players;
                updateLobbyUI(data.players);
                updateRemotePlayers(data.players);
                break;
                
            case 'player_left':
                playersInRoom = data.players;
                updateLobbyUI(data.players);
                updateRemotePlayers(data.players);
                break;
                
            case 'game_start':
                gameStarted = true;
                document.getElementById('lobby-screen').style.display = 'none';
                playersInRoom = data.players;
                updateRemotePlayers(data.players);
                
                // ИСПРАВЛЕНИЕ: Проверяем, инициализирована ли сцена, если нет - запускаем полную инициализацию
                if (!scene) {
                    // Если сцена не создана, запускаем полную инициализацию
                    startGameFull();
                } else if (!gameActive) {
                    // Если сцена есть, но игра не активна - просто активируем
                    startGameWithoutReinit();
                }
                break;
                
            case 'player_update':
                updateRemotePlayers(data.players);
                break;
                
            case 'player_died':
                if (data.playerId === myPlayerId) {
                    isSpectator = true;
                    gameActive = false;
                    showEventText('💀 Вы погибли! Наблюдайте за игрой.', 3);
                } else {
                    showEventText(`💀 ${data.playerName || 'Игрок'} погиб!`, 2);
                }
                updateRemotePlayers(data.players);
                break;

            case 'request_players':
                playersInRoom = data.players;
                updateLobbyUI(data.players);
                updateRemotePlayers(data.players);
                showEventText(`👥 В лобби ${data.players.length} игроков`, 1.5);
                break; 
                
            case 'game_over':
                gameStarted = false;
                gameActive = false;
                if (data.winner === myPlayerId) {
                    triggerWin();
                } else {
                    showEventText(`🏆 ${data.winnerName || 'Игрок'} победил!`, 5);
                }
                break;
                
            case 'light_toggle':
                if (data.isOn !== undefined) {
                    isCeilingLightOn = data.isOn;
                    if (isCeilingLightOn) {
                        if (ceilingPointLight) ceilingPointLight.intensity = 1.5;
                        if (ceilingBulbMat) ceilingBulbMat.emissive.setHex(0xffcc88);
                        if (switchRocker) switchRocker.rotation.x = -0.2;
                        if (ambientLight) ambientLight.intensity = 0.4;
                        if (mainLight) mainLight.intensity = 0.4;
                    } else {
                        if (ceilingPointLight) ceilingPointLight.intensity = 0;
                        if (ceilingBulbMat) ceilingBulbMat.emissive.setHex(0x000000);
                        if (switchRocker) switchRocker.rotation.x = 0.2;
                        if (ambientLight) ambientLight.intensity = 0.05;
                        if (mainLight) mainLight.intensity = 0.05;
                    }
                }
                break;
                
            case 'error':
                showEventText('❌ ' + data.message, 3);
                break;
        }
    } catch (e) {
        console.error('Ошибка обработки сообщения:', e);
    }
}

function showLobbyScreen() {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('join-screen').style.display = 'none';
    document.getElementById('lobby-screen').style.display = 'flex';
}

function updateLobbyUI(players) {
    playersInRoom = players || [];
    const count = playersInRoom.length;
    const names = playersInRoom.map(p => p.name || 'Игрок').join(', ');
    document.getElementById('players-list').innerHTML = `Игроки: (${count}) <span id="player-count" style="color: #fff; margin: 0 10px;">${names || '...'}</span>`;
    document.getElementById('lobby-code-display').textContent = roomCode;
    
    const startBtn = document.getElementById('btn-start-game');
    if (isHost && count >= 2) {
        startBtn.disabled = false;
        document.getElementById('lobby-status').textContent = '✅ Можно начинать игру!';
    } else if (isHost) {
        startBtn.disabled = true;
        document.getElementById('lobby-status').textContent = `⏳ Ожидание игроков... (${count}/2)`;
    } else {
        startBtn.disabled = true;
        document.getElementById('lobby-status').textContent = `⏳ Ожидание начала игры... (${count} игроков)`;
    }
}

document.getElementById('btn-refresh-players').addEventListener('click', () => {
    if (ws && ws.readyState === WebSocket.OPEN) {
        showEventText('🔄 Обновление списка...', 1);
        ws.send(JSON.stringify({
            type: 'request_players',
            roomCode: roomCode
        }));
    } else {
        showEventText('❌ Нет соединения с сервером', 2);
    }
});    

document.getElementById('btn-host').addEventListener('click', async () => {
    try {
        await connectToServer();
        const code = generateRoomCode();
        ws.send(JSON.stringify({
            type: 'create_room',
            roomCode: code,
            playerName: getPlayerName()
        }));
    } catch (e) {
        alert('Не удалось подключиться к серверу. Попробуйте позже.');
        console.error(e);
    }
});

document.getElementById('btn-join').addEventListener('click', () => {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('join-screen').style.display = 'flex';
    document.getElementById('join-code-input').value = '';
    document.getElementById('join-code-input').focus();
});

document.getElementById('btn-back-menu').addEventListener('click', () => {
    document.getElementById('join-screen').style.display = 'none';
    document.getElementById('start-screen').style.display = 'flex';
});

document.getElementById('btn-connect').addEventListener('click', async () => {
    const code = document.getElementById('join-code-input').value.trim();
    if (code.length !== 6 || !/^\d{6}$/.test(code)) {
        alert('Введите корректный 6-значный код');
        return;
    }
    try {
        await connectToServer();
        ws.send(JSON.stringify({
            type: 'join_room',
            roomCode: code,
            playerName: getPlayerName()
        }));
    } catch (e) {
        alert('Не удалось подключиться. Проверьте код или попробуйте позже.');
        console.error(e);
    }
});

document.getElementById('join-code-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('btn-connect').click();
    if (e.target.value.length >= 6 && e.key !== 'Backspace') {
        e.preventDefault();
    }
});

document.getElementById('btn-leave-lobby').addEventListener('click', () => {
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ 
            type: 'leave_room',
            roomCode: roomCode
        }));
        ws.close();
    }
    document.getElementById('lobby-screen').style.display = 'none';
    document.getElementById('start-screen').style.display = 'flex';
    gameStarted = false;
});

document.getElementById('btn-start-game').addEventListener('click', () => {
    if (ws && ws.readyState === WebSocket.OPEN && isHost) {
        ws.send(JSON.stringify({ type: 'start_game' }));
    }
});

function getPlayerName() {
    let name = localStorage.getItem('playerName');
    if (!name) {
        name = 'Игрок_' + String(Math.floor(1000 + Math.random() * 9000));
        localStorage.setItem('playerName', name);
    }
    return name;
}

let ceilingLightMesh, ceilingBulbMat, switchMesh, ceilingPointLight, switchRocker;

let gameActive = false;
let isPaused = false;
let gameTimeSeconds = 0;
const MAX_TIME = 360;

let pitch = 0, yaw = 0;
const moveState = { w: false, a: false, s: false, d: false };
const playerSpeed = 8.0;

const raycaster = new THREE.Raycaster();
const centerVector = new THREE.Vector2(0, 0);
let hoveredObject = null;

const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || 
                (window.innerWidth < 768 && window.innerHeight < 1024) ||
                ('ontouchstart' in window) ||

let mobileControlsActive = false;

// ============================================================
// 3. АУДИО

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const masterGain = audioCtx.createGain();
masterGain.connect(audioCtx.destination);
masterGain.gain.value = 0.7;

let ambientOsc;
let breathOsc = null;
let breathGain = null;
let heartbeatInterval = null;
let isBreathPlaying = false;

function initAudio() {
    try {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (ambientOsc) { try { ambientOsc.stop(); } catch(e){} }
        ambientOsc = audioCtx.createOscillator();
        ambientOsc.type = 'sine';
        ambientOsc.frequency.value = 55;
        const ambientGain = audioCtx.createGain();
        ambientGain.gain.value = 0.12;
        ambientOsc.connect(ambientGain);
        ambientGain.connect(masterGain);
        ambientOsc.start();
    } catch(e) { console.warn('Audio init error:', e); }
}

function playWinSound() {
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(440, audioCtx.currentTime);
    osc.frequency.setValueAtTime(554.37, audioCtx.currentTime + 0.5);
    osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 1.0);
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 1);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 4);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start();
    osc.stop(audioCtx.currentTime + 4);
}

function playDangerSound() {
    try {
        const osc = audioCtx.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.3);
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
        osc.connect(gain);
        gain.connect(masterGain);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
    } catch(e) {}
}

function playKnockSound() {
    try {
        for (let i = 0; i < 3; i++) {
            setTimeout(() => {
                const osc = audioCtx.createOscillator();
                osc.type = 'square';
                osc.frequency.setValueAtTime(150 + Math.random() * 50, audioCtx.currentTime);
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.05);
                osc.connect(gain);
                gain.connect(masterGain);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            }, i * 200);
        }
    } catch(e) {}
}

function playTVStaticSound(duration = 0.5) {
    try {
        const bufferSize = audioCtx.sampleRate * 0.1;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = (Math.random() * 2 - 1) * 0.3;
        }
        const source = audioCtx.createBufferSource();
        source.buffer = buffer;
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
        source.connect(gain);
        gain.connect(masterGain);
        source.start();
        source.stop(audioCtx.currentTime + duration);
    } catch(e) {}
}

function startBreathSound() {
    if (isBreathPlaying) return;
    isBreathPlaying = true;
    try {
        breathGain = audioCtx.createGain();
        breathGain.gain.value = 0;
        breathGain.connect(masterGain);
        breathOsc = audioCtx.createOscillator();
        breathOsc.type = 'sine';
        breathOsc.frequency.value = 45;
        breathOsc.connect(breathGain);
        breathOsc.start();
        let breathTime = 0;
        if (heartbeatInterval) clearInterval(heartbeatInterval);
        heartbeatInterval = setInterval(() => {
            if (!isBreathPlaying) return;
            breathTime += 0.1;
            const breathe = Math.sin(breathTime * 0.8) * 0.5 + 0.5;
            const targetGain = breathe * 0.12;
            if (breathGain) {
                breathGain.gain.linearRampToValueAtTime(targetGain, audioCtx.currentTime + 0.1);
            }
        }, 100);
    } catch(e) {}
}

function stopBreathSound() {
    isBreathPlaying = false;
    if (heartbeatInterval) { clearInterval(heartbeatInterval); heartbeatInterval = null; }
    if (breathGain) {
        try {
            breathGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
            setTimeout(() => {
                if (breathOsc) { try { breathOsc.stop(); } catch(e) {} breathOsc = null; }
                if (breathGain) { try { breathGain.disconnect(); } catch(e) {} breathGain = null; }
            }, 300);
        } catch(e) {}
    }
}

function playDeathSound() {
    try {
        const osc = audioCtx.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 1.5);
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.5);
        osc.connect(gain);
        gain.connect(masterGain);
        osc.start();
        osc.stop(audioCtx.currentTime + 1.5);
    } catch(e) {}
}

function playClickSound() {
    try {
        const osc = audioCtx.createOscillator();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.rampToValueAtTime(10, audioCtx.currentTime + 0.05);
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.05);
        osc.connect(gain);
        gain.connect(masterGain);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.05);
    } catch(e) {}
}

function init3D() {
    if (renderer) { renderer.domElement.remove(); renderer.dispose(); }
    
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020306);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 300);
    camera.position.set(0, 5, 0);

    renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    renderTarget = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight);
    postCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
    postScene = new THREE.Scene();

    const postShaders = {
        vertex: `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 1.0); }`,
        fragment: `
            uniform sampler2D tDiffuse;
            uniform float time;
            varying vec2 vUv;
            float rand(vec2 co){ return fract(sin(dot(co.xy ,vec2(12.9898,78.233))) * 43758.5453); }
            void main() {
                vec2 uv = vUv;
                float caOffset = 0.0015;
                float r = texture2D(tDiffuse, uv + vec2(caOffset, 0.0)).r;
                float g = texture2D(tDiffuse, uv).g;
                float b = texture2D(tDiffuse, uv - vec2(caOffset, 0.0)).b;
                vec3 color = vec3(r, g, b);
                float noise = rand(uv + 123.456) * 0.085;
                color -= vec3(noise);
                float dist = distance(uv, vec2(0.5));
                color *= smoothstep(1.0, 0.38, dist);
                color *= vec3(0.88, 0.92, 0.95);
                gl_FragColor = vec4(color, 1.0);
            }
        `
    };

    postMaterial = new THREE.ShaderMaterial({
        vertexShader: postShaders.vertex,
        fragmentShader: postShaders.fragment,
        uniforms: { tDiffuse: { value: renderTarget.texture }, time: { value: 0 } }
    });
    const postQuad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), postMaterial);
    postScene.add(postQuad);

    buildRoom();
    setupControls();
    window.addEventListener('resize', onWindowResize, false);
}

function buildRoom() {
    // Упрощенная комната - основные объекты
    const wallMat = new THREE.MeshStandardMaterial({ color: 0x4a3f32, roughness: 0.9, side: THREE.BackSide });
    const invMat = new THREE.MeshBasicMaterial({ visible: false });
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x2a221a, roughness: 1.0, side: THREE.BackSide });
    const woodMat = new THREE.MeshStandardMaterial({ color: 0x2a1a10, roughness: 0.8 });
    const metalMat = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.8, roughness: 0.4 });

    const roomGeo = new THREE.BoxGeometry(20, 10, 20);
    const roomMesh = new THREE.Mesh(roomGeo, [wallMat, invMat, wallMat, floorMat, wallMat, wallMat]);
    roomMesh.position.y = 5;
    roomMesh.receiveShadow = true;
    scene.add(roomMesh);

    ambientLight = new THREE.AmbientLight(0x1a2536, 0.4);
    scene.add(ambientLight);
    mainLight = new THREE.PointLight(0xd4d4b8, 0.4, 30);
    mainLight.position.set(0, 9, 0);
    mainLight.castShadow = true;
    scene.add(mainLight);

    // Шкаф
    wardrobeMesh = new THREE.Mesh(new THREE.BoxGeometry(3, 8, 3), woodMat);
    wardrobeMesh.position.set(8, 4, -8);
    wardrobeMesh.castShadow = true; wardrobeMesh.receiveShadow = true;
    wardrobeMesh.userData = { type: 'wardrobe' };
    scene.add(wardrobeMesh);

    // Дверь
    const doorMat = new THREE.MeshStandardMaterial({ color: 0x4a3a2a, roughness: 0.85 });
    doorMesh = new THREE.Mesh(new THREE.BoxGeometry(0.3, 7.0, 3.0), doorMat);
    doorMesh.position.set(9.85, 3.5, 0);
    doorMesh.userData = { type: 'door' };
    scene.add(doorMesh);

    // Кровать
    const bedX = -6.0, bedZ = 5.5;
    bedMesh = new THREE.Mesh(new THREE.BoxGeometry(8, 2.4, 6.5), new THREE.MeshBasicMaterial({ visible: false }));
    bedMesh.position.set(bedX, 1.2, bedZ);
    bedMesh.userData = { type: 'bed' };
    scene.add(bedMesh);

    // Записка
    noteMesh = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 1.1), new THREE.MeshStandardMaterial({ color: 0xfffdd0 }));
    noteMesh.position.set(-8, 2.51, -8);
    noteMesh.rotation.x = -Math.PI / 2;
    noteMesh.userData = { type: 'note' };
    scene.add(noteMesh);

    // Телевизор
    tvMesh = new THREE.Mesh(new THREE.BoxGeometry(3, 2.5, 1.5), metalMat);
    tvMesh.position.set(0, 3.25, -9);
    tvMesh.castShadow = true;
    scene.add(tvMesh);
    tvScreenMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
    const tvScreen = new THREE.Mesh(new THREE.PlaneGeometry(2.6, 2.0), tvScreenMat);
    tvScreen.position.set(0, 3.25, -8.24);
    scene.add(tvScreen);
    tvLight = new THREE.PointLight(0xffffff, 0, 15);
    tvLight.position.set(0, 3.5, -7);
    scene.add(tvLight);

    // Выключатель
    switchMesh = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.15), new THREE.MeshBasicMaterial({ visible: false }));
    switchMesh.position.set(9.85, 3.5, 2.2);
    switchMesh.userData = { type: 'switch' };
    scene.add(switchMesh);

    // Люстра
    ceilingLightMesh = new THREE.Group();
    ceilingLightMesh.position.set(0, 9.8, 0);
    ceilingBulbMat = new THREE.MeshStandardMaterial({ color: 0xfff5e6, roughness: 0.3, emissive: new THREE.Color(0x000000) });
    const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), ceilingBulbMat);
    bulb.position.y = -0.8;
    ceilingLightMesh.add(bulb);
    scene.add(ceilingLightMesh);
    ceilingPointLight = new THREE.PointLight(0xffeebb, 0, 15);
    ceilingPointLight.position.set(0, 9.0, 0);
    scene.add(ceilingPointLight);

    switchRocker = { rotation: { x: 0.2 } };
    
    // Часы
    const clockCanvas = document.createElement('canvas');
    clockCanvas.width = 256; clockCanvas.height = 128;
    clockCtx = clockCanvas.getContext('2d');
    clockTex = new THREE.CanvasTexture(clockCanvas);
    clockMat = new THREE.MeshBasicMaterial({ map: clockTex });
    const clockMesh = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 0.1), clockMat);
    clockMesh.position.set(-5, 7, -9.9);
    scene.add(clockMesh);
    updateClockTexture("00:00");
}

function updateClockTexture(timeStr) {
    if (!clockCtx) return;
    clockCtx.fillStyle = '#0a0a0a'; clockCtx.fillRect(0, 0, 256, 128);
    clockCtx.shadowBlur = 10; clockCtx.shadowColor = '#ff0000';
    clockCtx.fillStyle = '#ff0000'; clockCtx.font = 'bold 80px "Courier New"';
    clockCtx.textAlign = 'center'; clockCtx.textBaseline = 'middle';
    clockCtx.fillText(timeStr, 128, 64); clockCtx.shadowBlur = 0;
    clockTex.needsUpdate = true;
}

function createPlayerModel(color = 0x44aaff, name = '') {
    const group = new THREE.Group();
    
    const bodyMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.6, metalness: 0.1 });
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 0.4), bodyMat);
    body.position.y = 0.9;
    body.castShadow = true;
    group.add(body);
    
    const headMat = new THREE.MeshStandardMaterial({ color: 0xffddbb, roughness: 0.7 });
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 8), headMat);
    head.position.y = 1.5;
    head.castShadow = true;
    group.add(head);
    
    const armMat = new THREE.MeshStandardMaterial({ color: 0xffddbb, roughness: 0.7 });
    const armL = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.6, 0.12), armMat);
    armL.position.set(-0.4, 1.0, 0);
    group.add(armL);
    const armR = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.6, 0.12), armMat);
    armR.position.set(0.4, 1.0, 0);
    group.add(armR);
    
    const legMat = new THREE.MeshStandardMaterial({ color: 0x334466, roughness: 0.7 });
    const legL = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.6, 0.2), legMat);
    legL.position.set(-0.2, 0.3, 0);
    group.add(legL);
    const legR = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.6, 0.2), legMat);
    legR.position.set(0.2, 0.3, 0);
    group.add(legR);
    
    if (name) {
        const canvas = document.createElement('canvas');
        canvas.width = 256;
        canvas.height = 64;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        if (ctx.roundRect) {
            ctx.roundRect(10, 10, 236, 44, 10);
        } else {
            ctx.rect(10, 10, 236, 44);
        }
        ctx.fill();
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 32px "Courier New"';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(name, 128, 36);
        
        const nameTexture = new THREE.CanvasTexture(canvas);
        const nameMat = new THREE.SpriteMaterial({ map: nameTexture, transparent: true, depthTest: false });
        const nameSprite = new THREE.Sprite(nameMat);
        nameSprite.position.y = 2.2;
        nameSprite.scale.set(1.5, 0.4, 1);
        group.add(nameSprite);
    }
    
    return group;
}

function setupControls() {
    if (!isMobile) {
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body && gameActive) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, pitch));
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
            }
        });
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w' || key === 'ц') moveState.w = true;
            if (key === 'a' || key === 'ф') moveState.a = true;
            if (key === 's' || key === 'ы') moveState.s = true;
            if (key === 'd' || key === 'в') moveState.d = true;
        });
        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w' || key === 'ц') moveState.w = false;
            if (key === 'a' || key === 'ф') moveState.a = false;
            if (key === 's' || key === 'ы') moveState.s = false;
            if (key === 'd' || key === 'в') moveState.d = false;
        });
        document.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return;
            const photoUI = document.getElementById('photo-ui');
            if (photoUI.style.display === 'block') { photoUI.style.display = 'none'; return; }
            if (document.pointerLockElement !== document.body && gameActive && !isPaused) {
                document.body.requestPointerLock();
                return;
            }
            handleInteraction();
        });
        document.addEventListener('pointerlockchange', () => {
            if (gameActive) {
                if (document.pointerLockElement === document.body) {
                    isPaused = false;
                    document.getElementById('pause-screen').style.display = 'none';
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                } else if (!isMobile) {
                    isPaused = true;
                    document.getElementById('pause-screen').style.display = 'flex';
                    if (audioCtx.state === 'running') audioCtx.suspend();
                }
            }
        });
    }
    if (isMobile) setupMobileControls();
}

// === МОБИЛЬНЫЙ FULLSCREEN ===
function handleMobileFullscreen() {
    if (isMobile) {
        function setVH() {
            const vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        setVH();
        window.addEventListener('resize', setVH);
        
        document.addEventListener('touchstart', () => {
            if (document.documentElement.requestFullscreen && !document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            }
        }, { passive: true });
        
        if (window.screen && window.screen.orientation) {
            window.screen.orientation.addEventListener('change', () => {
                setVH();
                if (!document.fullscreenElement && document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen().catch(() => {});
                }
            });
        }
        
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement && isMobile) {
                setTimeout(() => {
                    if (!document.fullscreenElement && document.documentElement.requestFullscreen) {
                        document.documentElement.requestFullscreen().catch(() => {});
                    }
                }, 500);
            }
        });
        
        document.addEventListener('gesturestart', (e) => e.preventDefault());
        document.addEventListener('gesturechange', (e) => e.preventDefault());
        document.addEventListener('gestureend', (e) => e.preventDefault());
        
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, { passive: false });
    }
}

document.addEventListener('DOMContentLoaded', handleMobileFullscreen);
    
function setupMobileControls() {
    const controls = document.getElementById('mobile-controls');
    controls.classList.add('active');
    const joystickArea = document.getElementById('touch-joystick-area');
    const lookArea = document.getElementById('touch-look-area-mobile');
    touchInteractBtn = document.getElementById('touch-interact');
    joystickKnob = document.getElementById('joystick-knob');
    const lockHint = document.getElementById('mobile-lock-hint');
    
    document.addEventListener('touchstart', (e) => {
        if (gameActive && document.pointerLockElement !== document.body) {
            document.body.requestPointerLock();
            lockHint.style.display = 'none';
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
    }, { passive: true });
    
    joystickArea.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (!gameActive) return;
        const touch = e.touches[0];
        const rect = joystickArea.getBoundingClientRect();
        touchJoystickStartX = rect.left + rect.width / 2;
        touchJoystickStartY = rect.top + rect.height / 2;
        touchJoystickActive = true;
        updateJoystick(touch.clientX, touch.clientY);
    }, { passive: false });
    
    joystickArea.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (!touchJoystickActive || !gameActive) return;
        const touch = e.touches[0];
        updateJoystick(touch.clientX, touch.clientY);
    }, { passive: false });
    
    joystickArea.addEventListener('touchend', (e) => {
        e.preventDefault();
        touchJoystickActive = false;
        touchJoystick.x = 0; touchJoystick.y = 0;
        if (joystickKnob) joystickKnob.style.transform = 'translate(-50%, -50%)';
        moveState.w = false; moveState.s = false; moveState.a = false; moveState.d = false;
    }, { passive: false });
    
    // Обзор на мобильных - вся правая половина экрана
    let touchLookActive = false;
    let touchLookStartX = 0, touchLookStartY = 0;
    
    lookArea.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (!gameActive) return;
        const touch = e.touches[0];
        touchLookStartX = touch.clientX; touchLookStartY = touch.clientY;
        touchLookActive = true;
    }, { passive: false });
    
    lookArea.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (!touchLookActive || !gameActive) return;
        const touch = e.touches[0];
        const dx = touch.clientX - touchLookStartX;
        const dy = touch.clientY - touchLookStartY;
        const sensitivity = 0.008;
        yaw += dx * sensitivity;
        pitch -= dy * sensitivity;
        pitch = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, pitch));
        camera.rotation.set(pitch, yaw, 0, 'YXZ');
        touchLookStartX = touch.clientX;
        touchLookStartY = touch.clientY;
    }, { passive: false });
    
    lookArea.addEventListener('touchend', (e) => { 
        e.preventDefault();
        touchLookActive = false; 
    }, { passive: false });
    
    touchInteractBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (!gameActive) return;
        handleInteraction();
    }, { passive: false });
}

function updateJoystick(clientX, clientY) {
    const dx = clientX - touchJoystickStartX;
    const dy = clientY - touchJoystickStartY;
    const maxRadius = 50;
    const distance = Math.sqrt(dx*dx + dy*dy);
    let normX = 0, normY = 0;
    if (distance > 5) {
        const clamped = Math.min(distance, maxRadius);
        normX = (dx / distance) * (clamped / maxRadius);
        normY = (dy / distance) * (clamped / maxRadius);
    }
    touchJoystick.x = normX; touchJoystick.y = normY;
    if (joystickKnob) {
        const knobX = normX * maxRadius;
        const knobY = normY * maxRadius;
        joystickKnob.style.transform = `translate(calc(-50% + ${knobX}px), calc(-50% + ${knobY}px))`;
    }
    const deadZone = 0.15;
    const rawX = normX, rawY = normY;
    moveState.w = rawY < -deadZone;
    moveState.s = rawY > deadZone;
    moveState.a = rawX < -deadZone;
    moveState.d = rawX > deadZone;
}

function handleInteraction() {
    const photoUI = document.getElementById('photo-ui');
    if (photoUI.style.display === 'block') { photoUI.style.display = 'none'; return; }
    if (hoveredObject && gameActive && !isPaused && !isSpectator) {
        if (hoveredObject.userData.type === 'note') {
            document.getElementById('photo-ui').style.display = 'block';
        } else if (hoveredObject.userData.type === 'door') {
            if (horrorState.phase >= 2) {
                triggerDeath('door');
            } else {
                showEventText('🚪 Дверь заперта...', 2);
            }
        } else if (hoveredObject.userData.type === 'bed') {
            showEventText('🛏️ Под кроватью темно...', 2);
            if (horrorState.phase >= 1) {
                showEventText('🛏️ Ты прячешься под кроватью...', 2);
                const flash = document.getElementById('death-flash');
                flash.style.opacity = '0.3';
                setTimeout(() => { flash.style.opacity = '0'; }, 1000);
            }
        } else if (hoveredObject.userData.type === 'wardrobe') {
            showEventText('🚪 Шкаф', 1);
            if (horrorState.phase >= 1) {
                showEventText('🚪 Ты прячешься в шкафу...', 2);
                const flash = document.getElementById('death-flash');
                flash.style.opacity = '0.3';
                setTimeout(() => { flash.style.opacity = '0'; }, 1000);
            }
        } else if (hoveredObject.userData.type === 'switch') {
            if (horrorState.powerOutage) {
                isCeilingLightOn = true;
                horrorState.powerOutage = false;
                if (ceilingPointLight) ceilingPointLight.intensity = 1.5;
                if (ceilingBulbMat) ceilingBulbMat.emissive.setHex(0xffcc88);
                if (switchRocker) switchRocker.rotation.x = -0.2;
                if (ambientLight) ambientLight.intensity = 0.4;
                if (mainLight) mainLight.intensity = 0.4;
                showEventText('💡 Свет включен!', 1.5);
                playClickSound();
                document.getElementById('timer-warning').classList.remove('show');
            } else {
                isCeilingLightOn = !isCeilingLightOn;
                if (isCeilingLightOn) {
                    if (ceilingPointLight) ceilingPointLight.intensity = 1.5;
                    if (ceilingBulbMat) ceilingBulbMat.emissive.setHex(0xffcc88);
                    if (switchRocker) switchRocker.rotation.x = -0.2;
                    if (ambientLight) ambientLight.intensity = 0.4;
                    if (mainLight) mainLight.intensity = 0.4;
                } else {
                    if (ceilingPointLight) ceilingPointLight.intensity = 0;
                    if (ceilingBulbMat) ceilingBulbMat.emissive.setHex(0x000000);
                    if (switchRocker) switchRocker.rotation.x = 0.2;
                    if (ambientLight) ambientLight.intensity = 0.05;
                    if (mainLight) mainLight.intensity = 0.05;
                }
                playClickSound();
            }
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'light_toggle',
                    isOn: isCeilingLightOn
                }));
            }
        }
    }
}

function showEventText(text, duration = 3) {
    const el = document.getElementById('event-text');
    el.textContent = text;
    el.classList.add('show');
    if (horrorState.eventTextTimeout) clearTimeout(horrorState.eventTextTimeout);
    horrorState.eventTextTimeout = setTimeout(() => {
        el.classList.remove('show');
    }, duration * 1000);
}

function checkCollision(pos) {
    const pr = 0.5;
    if (pos.x < -10.0 + pr || pos.x > 10.0 - pr || pos.z < -10.0 + pr || pos.z > 10.0 - pr) return true;
    if (pos.x > 8 - 1.5 - pr && pos.x < 8 + 1.5 + pr && pos.z > -8 - 1.5 - pr && pos.z < -8 + 1.5 + pr) return true;
    if (pos.x > 0 - 2.0 - pr && pos.x < 0 + 2.0 + pr && pos.z > -9 - 1.0 - pr && pos.z < -9 + 1.0 + pr) return true;
    if (pos.x > -8 - 1.0 - pr && pos.x < -8 + 1.0 + pr && pos.z > -8 - 1.0 - pr && pos.z < -8 + 1.0 + pr) return true;
    if (pos.x > 9.85 - 0.3 - pr && pos.x < 9.85 + 0.3 + pr && pos.z > -1.25 - pr && pos.z < 1.25 + pr) return true;
    if (pos.x >= -10.0 - pr && pos.x <= -2.0 + pr && pos.z >= 2.25 - pr && pos.z <= 8.75 + pr) return true;
    return false;
}

function formatTime(seconds) {
    let h = Math.floor(seconds / 60);
    let m = Math.floor(seconds % 60);
    return `${h < 10 ? '0' : ''}${h}:${m < 10 ? '0' : ''}${m}`;
}

function triggerDeath(type) {
    if (horrorState.deathPending) return;
    horrorState.deathPending = true;
    gameActive = false;
    document.exitPointerLock();
    if (ambientOsc) { try { ambientOsc.stop(); } catch(e){} }
    stopBreathSound();
    
    const deathDesc = document.getElementById('death-desc');
    switch(type) {
        case 'tv': deathDesc.textContent = 'Лицо вышло из телевизора... Ты исчез.'; break;
        case 'dark': deathDesc.textContent = 'Фигура появилась из угла...'; break;
        case 'window': deathDesc.textContent = 'Стекло разбилось, рука схватила тебя...'; break;
        case 'door': deathDesc.textContent = 'Ты открыл дверь... И она стояла там.'; break;
        default: deathDesc.textContent = 'Ты исчез...';
    }
    
    playDeathSound();
    
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'player_died' }));
    }
    
    const flash = document.getElementById('death-flash');
    flash.style.opacity = '1';
    setTimeout(() => {
        document.getElementById('game-over-screen').style.display = 'flex';
        setTimeout(() => {
            document.getElementById('game-over-screen').style.opacity = '1';
        }, 50);
    }, 300);
}

function triggerWin() {
    gameActive = false;
    document.exitPointerLock();
    if(ambientOsc) { try { ambientOsc.stop(); } catch(e){} }
    stopBreathSound();
    
    if (mainLight) { mainLight.color.setHex(0xffaa55); mainLight.intensity = 0.25; }
    if (ambientLight) { ambientLight.color.setHex(0xffaa55); ambientLight.intensity = 0.1; }
    if (scene) scene.fog.color.setHex(0x332211);
    
    playWinSound();
    document.getElementById('win-screen').style.display = 'flex';
    setTimeout(() => { document.getElementById('win-screen').style.opacity = '1'; }, 50);
}

// 8. ОБНОВЛЕНИЕ ИГРЫ
// ============================================================

function updateHorror(delta) {
    if (!gameActive || isPaused || horrorState.deathPending || isSpectator) return;
    
    const time = gameTimeSeconds;
    
    if (time < 90) horrorState.phase = 0;
    else if (time < 180) horrorState.phase = 1;
    else if (time < 330) horrorState.phase = 2;
    else horrorState.phase = 3;
    
    const isMoving = moveState.w || moveState.a || moveState.s || moveState.d;
    if (isMoving) {
        horrorState.lastMoveTime = time;
        horrorState.isStandingStill = false;
        horrorState.standStillTimer = 0;
        document.getElementById('breath-indicator').classList.remove('show');
        stopBreathSound();
    } else {
        horrorState.standStillTimer += delta;
        if (horrorState.standStillTimer > 5 && horrorState.phase >= 1) {
            horrorState.isStandingStill = true;
            if (!isBreathPlaying) {
                document.getElementById('breath-indicator').classList.add('show');
                startBreathSound();
            }
        }
    }
    
    if (horrorState.phase >= 1) {
        if (time > 30 && time < 35 && !horrorState.tvEvent) {
            showEventText('📺 Шёпот из телевизора...', 2);
            playTVStaticSound(1);
            horrorState.tvEvent = true;
        }
        if (time > 75 && time < 80 && !horrorState.knockEvent) {
            showEventText('👤 Силуэт за деревьями...', 2);
            horrorState.knockEvent = true;
        }
        if (time > 120 && time < 125) {
            if (!horrorState.flickerActive) {
                horrorState.flickerActive = true;
                horrorState.flickerTimer = 0;
            }
        }
    }
    
    if (horrorState.flickerActive && isCeilingLightOn && ceilingPointLight) {
        horrorState.flickerTimer += delta;
        const flickerInterval = horrorState.phase >= 2 ? 0.5 : 2.0;
        if (horrorState.flickerTimer > flickerInterval) {
            horrorState.flickerTimer = 0;
            const flickerEl = document.getElementById('flicker-overlay');
            if (Math.random() < 0.3) {
                flickerEl.style.opacity = '0.3';
                setTimeout(() => { flickerEl.style.opacity = '0'; }, 100);
            }
            if (Math.random() < 0.15) {
                ceilingPointLight.intensity = isCeilingLightOn ? 0.2 : 1.5;
                setTimeout(() => {
                    ceilingPointLight.intensity = isCeilingLightOn ? 1.5 : 0;
                }, 200);
            }
        }
    }
    
    if (horrorState.phase >= 2) {
        if (time > 213 && time < 220 && !horrorState.tvWatched) {
            if (!horrorState.tvEvent) {
                horrorState.tvEvent = true;
                showEventText('📺 Телевизор включился! Отвернись!', 3);
                if (tvScreenMat) tvScreenMat.color.setHex(0xffffff);
                if (tvLight) tvLight.intensity = 1.5;
                playTVStaticSound(3);
                horrorState.tvWatched = true;
                horrorState.tvWatchedTime = 0;
            }
        }
        if (horrorState.tvWatched) {
            horrorState.tvWatchedTime += delta;
            const tvPos = new THREE.Vector3(0, 3.25, -9);
            const camPos = camera.position.clone();
            const dirToTv = tvPos.clone().sub(camPos).normalize();
            const camDir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const angle = dirToTv.angleTo(camDir);
            if (angle < 0.5 && horrorState.tvWatchedTime > 3) {
                triggerDeath('tv');
                return;
            } else if (angle > 0.8 && horrorState.tvWatchedTime > 2) {
                if (tvScreenMat) tvScreenMat.color.setHex(0x000000);
                if (tvLight) tvLight.intensity = 0;
                horrorState.tvWatched = false;
                horrorState.tvEvent = false;
                showEventText('✅ ТВ выключился', 1);
            }
        }
        
        if (horrorState.phase >= 2 && !horrorState.knockActive) {
            if (Math.random() < 0.001 && time > 180) {
                horrorState.knockActive = true;
                horrorState.knockTimer = 0;
                showEventText('🔊 СТУК В ОКНО!', 2);
                playKnockSound();
            }
        }
        if (horrorState.knockActive) {
            horrorState.knockTimer += delta;
            const windowPos = new THREE.Vector3(-10, 5, 0);
            const camPos = camera.position.clone();
            const dirToWindow = windowPos.clone().sub(camPos).normalize();
            const camDir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const angle = dirToWindow.angleTo(camDir);
            if (angle < 0.4) {
                const veins = document.getElementById('danger-veins');
                veins.classList.add('active');
                if (horrorState.knockTimer > 2) {
                    triggerDeath('window');
                    return;
                }
            } else {
                document.getElementById('danger-veins').classList.remove('active');
                if (horrorState.knockTimer > 10) {
                    horrorState.knockActive = false;
                    showEventText('✅ Стук прекратился', 1);
                }
            }
        }
        
        if (time > 180 && time < 185 && horrorState.powerOutageCount === 0) {
            triggerPowerOutage();
        }
        if (time > 270 && time < 275 && horrorState.powerOutageCount === 1) {
            triggerPowerOutage();
        }
        if (horrorState.powerOutage) {
            horrorState.powerOutageTimer += delta;
            if (horrorState.powerOutageTimer > 20) {
                triggerDeath('dark');
                return;
            }
            document.getElementById('timer-warning').classList.add('show');
            document.getElementById('timer-warning').textContent = `⚠️ СВЕТ ВЫКЛЮЧЕН! ${Math.ceil(20 - horrorState.powerOutageTimer)}с`;
        }
    }
    
    if (horrorState.powerOutage) {
        const warning = document.getElementById('timer-warning');
        warning.classList.add('show');
        warning.textContent = `⚠️ СВЕТ ВЫКЛЮЧЕН! ${Math.ceil(20 - horrorState.powerOutageTimer)}с`;
    }
    
    if (ws && ws.readyState === WebSocket.OPEN && gameActive && !isSpectator) {
        ws.send(JSON.stringify({
            type: 'player_update',
            position: { x: camera.position.x, y: camera.position.y, z: camera.position.z },
            rotation: { pitch, yaw }
        }));
    }
}

function triggerPowerOutage() {
    if (horrorState.powerOutage) return;
    horrorState.powerOutage = true;
    horrorState.powerOutageTimer = 0;
    horrorState.powerOutageCount++;
    
    isCeilingLightOn = false;
    if (ceilingPointLight) ceilingPointLight.intensity = 0;
    if (ceilingBulbMat) ceilingBulbMat.emissive.setHex(0x000000);
    if (switchRocker) switchRocker.rotation.x = 0.2;
    if (ambientLight) ambientLight.intensity = 0.02;
    if (mainLight) mainLight.intensity = 0.02;
    
    showEventText('💡 СВЕТ ОТКЛЮЧИЛИ! Найди выключатель!', 3);
    playDangerSound();
    
    const flickerEl = document.getElementById('flicker-overlay');
    flickerEl.style.opacity = '0.5';
    setTimeout(() => { flickerEl.style.opacity = '0'; }, 200);
}

// ============================================================
// 9. ОБНОВЛЕНИЕ УДАЛЕННЫХ ИГРОКОВ
// ============================================================

function updateRemotePlayers(players) {
    console.log('🔄 Обновление игроков:', players);
    
    if (!scene) return;
    
    // Удаляем старые модели
    for (const id in playerMeshes) {
        if (!players.find(p => p.id === id)) {
            if (scene) scene.remove(playerMeshes[id]);
            delete playerMeshes[id];
        }
    }
    
    for (const player of players) {
        if (player.id === myPlayerId) continue;
        if (!player) continue;
        
        if (!playerMeshes[player.id]) {
            const color = player.color || 0x44aaff;
            const model = createPlayerModel(color, player.name || 'Игрок');
            
            if (player.alive === false) {
                model.children.forEach(child => {
                    if (child.material) {
                        child.material.transparent = true;
                        child.material.opacity = 0.3;
                    }
                });
            }
            
            if (scene) scene.add(model);
            playerMeshes[player.id] = model;
            console.log('✅ Создана модель для:', player.name, player.id);
        }
        
        const model = playerMeshes[player.id];
        if (model && player && player.position) {
            model.position.set(player.position.x, player.position.y, player.position.z);
            if (player.rotation) {
                model.rotation.set(0, player.rotation.yaw || 0, 0);
            }
            
            const isAlive = player.alive !== false;
            model.children.forEach(child => {
                if (child.material) {
                    child.material.transparent = true;
                    child.material.opacity = isAlive ? 1 : 0.3;
                }
            });
        }
    }
}

// ============================================================
// 10. ГЛАВНЫЙ ЦИКЛ
// ============================================================

const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();

    if (gameActive && !isPaused && !isSpectator && camera && scene) {
        gameTimeSeconds += delta;
        updateClockTexture(formatTime(gameTimeSeconds));
        updateHorror(delta);

        if (gameTimeSeconds >= MAX_TIME) {
            triggerWin();
        }

        const forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
        const right = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
        
        const moveVec = new THREE.Vector3();
        if (moveState.w) moveVec.add(forward);
        if (moveState.s) moveVec.sub(forward);
        if (moveState.a) moveVec.sub(right);
        if (moveState.d) moveVec.add(right);
        
        moveVec.normalize().multiplyScalar(playerSpeed * delta);
        
        const testX = camera.position.clone();
        testX.x += moveVec.x;
        if (!checkCollision(testX)) camera.position.x += moveVec.x;

        const testZ = camera.position.clone();
        testZ.z += moveVec.z;
        if (!checkCollision(testZ)) camera.position.z += moveVec.z;

        if (wardrobeMesh && noteMesh && doorMesh && bedMesh && switchMesh) {
            raycaster.setFromCamera(centerVector, camera);
            const intersects = raycaster.intersectObjects([wardrobeMesh, noteMesh, doorMesh, bedMesh, switchMesh]);
            
            const hint = document.getElementById('interaction-hint');
            const touchInteract = document.getElementById('touch-interact');
            
            if (intersects.length > 0 && intersects[0].distance < 4.0) {
                hoveredObject = intersects[0].object;
                let text = "";
                if (hoveredObject.userData.type === 'note') text = "📄 ЛКМ - Посмотреть фото";
                else if (hoveredObject.userData.type === 'wardrobe') {
                    text = "🚪 ЛКМ - Шкаф (спрятаться)";
                }
                else if (hoveredObject.userData.type === 'door') text = "🚪 ЛКМ - Выйти";
                else if (hoveredObject.userData.type === 'bed') text = "🛏️ ЛКМ - Под кровать (спрятаться)";
                else if (hoveredObject.userData.type === 'switch') {
                    text = horrorState.powerOutage ? "💡 ЛКМ - Включить свет!" : (isCeilingLightOn ? "🔆 ЛКМ - Выключить свет" : "🔅 ЛКМ - Включить свет");
                }
                
                if (!isMobile) {
                    hint.innerText = text;
                    hint.style.display = 'block';
                } else {
                    touchInteract.innerText = text.replace('ЛКМ - ', '');
                    touchInteract.classList.add('active');
                }
            } else {
                hoveredObject = null;
                if (!isMobile) {
                    hint.style.display = 'none';
                } else {
                    touchInteract.classList.remove('active');
                }
            }
        }
    }

    if (renderer && scene && camera && renderTarget && postScene && postCamera) {
        renderer.setRenderTarget(renderTarget);
        renderer.render(scene, camera);
        renderer.setRenderTarget(null);
        
        if (postMaterial) {
            postMaterial.uniforms.time.value += delta;
        }
        renderer.render(postScene, postCamera);
    }
}

function onWindowResize() {
    if (camera) {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
    }
    if (renderer) {
        renderer.setSize(window.innerWidth, window.innerHeight);
    }
    if (renderTarget) {
        renderTarget.setSize(window.innerWidth, window.innerHeight);
    }
}

// ============================================================
// 11. ВИДЕО-СЦЕНА
// ============================================================

function playVideoScene() {
    return new Promise((resolve) => {
        const videoScene = document.getElementById('video-scene');
        const video = document.getElementById('intro-video');
        const dialogueBox = document.getElementById('dialogue-box');
        const speakerName = document.getElementById('speaker-name');
        const dialogueText = document.getElementById('dialogue-text');
        const skipBtn = document.getElementById('skip-video');

        videoScene.style.display = 'flex';
        video.currentTime = 0;
        
        const dialogues = [
            { start: 0, end: 10, speaker: 'РИЕЛТОР:', text: 'Алло! Привет! Ну короче, ключи я оставил под дверью. С оплатой можешь вообще не торопиться — сколько надо, столько и живи, мне некуда спешить.' },
            { start: 11, end: 12, speaker: 'ВЫ:', text: 'Хорошо, спасибо.' },
            { start: 12, end: 14, speaker: 'РИЕЛТОР:', text: 'Что? Не слышу...' },
            { start: 15, end: 16, speaker: '◄', text: 'ГУДКИ' },
            { start: 16.9, end: 18, speaker: 'ВЫ:', text: 'Алё? Алё! Связь чтоли плохая...' }
        ];

        let currentDialogueIndex = -1;
        let dialogueTimeout = null;
        let isSkipped = false;

        function updateDialogue(time) {
            let found = -1;
            for (let i = dialogues.length - 1; i >= 0; i--) {
                if (time >= dialogues[i].start && time <= dialogues[i].end) {
                    found = i;
                    break;
                }
            }
            if (found !== currentDialogueIndex) {
                currentDialogueIndex = found;
                if (dialogueTimeout) { clearTimeout(dialogueTimeout); dialogueTimeout = null; }
                if (found >= 0) {
                    const d = dialogues[found];
                    speakerName.textContent = d.speaker;
                    dialogueText.textContent = d.text;
                    dialogueBox.classList.add('show');
                    if (d.speaker === '◄') {
                        try {
                            const osc = audioCtx.createOscillator();
                            osc.type = 'sawtooth';
                            osc.frequency.setValueAtTime(450, audioCtx.currentTime);
                            osc.frequency.linearRampToValueAtTime(300, audioCtx.currentTime + 1);
                            const gain = audioCtx.createGain();
                            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1);
                            osc.connect(gain);
                            gain.connect(masterGain);
                            osc.start();
                            osc.stop(audioCtx.currentTime + 1);
                        } catch(e) {}
                    }
                    const duration = d.end - d.start + 0.5;
                    dialogueTimeout = setTimeout(() => {
                        dialogueBox.classList.remove('show');
                    }, duration * 1000);
                } else {
                    dialogueBox.classList.remove('show');
                }
            }
        }

        function onVideoEnd() {
            if (isSkipped) return;
            videoScene.style.display = 'none';
            video.removeEventListener('timeupdate', timeUpdateHandler);
            video.removeEventListener('ended', onVideoEnd);
            resolve();
        }

        function timeUpdateHandler() {
            if (isSkipped) return;
            updateDialogue(video.currentTime);
        }

        skipBtn.addEventListener('click', () => {
            if (isSkipped) return;
            isSkipped = true;
            video.pause();
            videoScene.style.display = 'none';
            video.removeEventListener('timeupdate', timeUpdateHandler);
            video.removeEventListener('ended', onVideoEnd);
            if (dialogueTimeout) clearTimeout(dialogueTimeout);
            resolve();
        });

        if (audioCtx.state === 'suspended') audioCtx.resume();
        video.muted = false;
        video.volume = 0.8;
        
        const playPromise = video.play();
        if (playPromise !== undefined) {
            playPromise.catch(() => {
                const clickHandler = () => {
                    video.play().catch(() => {});
                    document.removeEventListener('click', clickHandler);
                };
                document.addEventListener('click', clickHandler);
            });
        }

        video.addEventListener('timeupdate', timeUpdateHandler);
        video.addEventListener('ended', onVideoEnd);
        
        setTimeout(() => {
            if (!isSkipped && !video.ended) {
                isSkipped = true;
                videoScene.style.display = 'none';
                video.removeEventListener('timeupdate', timeUpdateHandler);
                video.removeEventListener('ended', onVideoEnd);
                resolve();
            }
        }, 30000);
    });
}

// ИСПРАВЛЕНИЕ: Функция полного запуска игры (создает сцену с нуля)
function startGameFull() {
    initAudio();
    init3D(); // Создает сцену и все 3D объекты
    gameActive = true;
    clock.start();
    isSpectator = false;
    
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
            type: 'request_players'
        }));
    }
    
    horrorState = {
        phase: 0, tvEvent: false, tvEventTimer: 0, tvWatched: false, tvWatchedTime: 0,
        knockEvent: false, knockTimer: 0, knockActive: false,
        powerOutage: false, powerOutageTimer: 0, powerOutageCount: 0,
        isInCloset: false, lastMoveTime: 0, isStandingStill: false, standStillTimer: 0,
        deathPending: false, deathType: '', eventTextTimeout: null,
        flickerTimer: 0, flickerActive: false, lightFlickerTimer: 0,
    };
    
    if (!animationRunning) {
        animationRunning = true;
        animate();
    }
    
    setTimeout(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({
                type: 'player_update',
                position: { x: camera.position.x, y: camera.position.y, z: camera.position.z },
                rotation: { pitch, yaw }
            }));
        }
    }, 100);
    
    if (isMobile) {
        document.getElementById('mobile-lock-hint').style.display = 'block';
        setTimeout(() => {
            if (document.pointerLockElement !== document.body) {
                document.body.requestPointerLock();
            }
        }, 500);
    } else {
        document.body.requestPointerLock();
    }
}

// Старая функция startGame теперь вызывает startGameFull
async function startGame() {
    startGameFull();
}

function resetGame() {
    gameActive = false;
    animationRunning = false;
    gameTimeSeconds = 0;
    isPaused = false;
    isCeilingLightOn = false;
    pitch = 0; yaw = 0;
    isSpectator = false;
    
    if (camera) {
        camera.position.set(0, 5, 0);
        camera.rotation.set(0, 0, 0);
    }
    
    if (tvScreenMat) tvScreenMat.color.setHex(0x000000);
    if (tvLight) tvLight.intensity = 0;
    if (mainLight) { mainLight.color.setHex(0xd4d4b8); mainLight.intensity = 0.4; }
    if (ambientLight) { ambientLight.color.setHex(0x1a2536); ambientLight.intensity = 0.4; }
    if (scene) scene.fog.color.setHex(0x030508);
    
    document.getElementById('game-over-screen').style.display = 'none';
    document.getElementById('game-over-screen').style.opacity = '0';
    document.getElementById('win-screen').style.display = 'none';
    document.getElementById('win-screen').style.opacity = '0';
    document.getElementById('pause-screen').style.display = 'none';
    document.getElementById('photo-ui').style.display = 'none';
    document.getElementById('danger-veins').classList.remove('active');
    document.getElementById('glitch-overlay').classList.remove('active');
    document.getElementById('death-flash').style.opacity = '0';
    document.getElementById('timer-warning').classList.remove('show');
    document.getElementById('breath-indicator').classList.remove('show');
    
    for (const id in playerMeshes) {
        if (scene) scene.remove(playerMeshes[id]);
        delete playerMeshes[id];
    }
    
    horrorState = {
        phase: 0, tvEvent: false, tvEventTimer: 0, tvWatched: false, tvWatchedTime: 0,
        knockEvent: false, knockTimer: 0, knockActive: false,
        powerOutage: false, powerOutageTimer: 0, powerOutageCount: 0,
        isInCloset: false, lastMoveTime: 0, isStandingStill: false, standStillTimer: 0,
        deathPending: false, deathType: '', eventTextTimeout: null,
        flickerTimer: 0, flickerActive: false, lightFlickerTimer: 0,
    };
    
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (ambientOsc) { try { ambientOsc.stop(); } catch(e){} }
    initAudio();
    updateClockTexture("00:00");
    init3D();
    
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'restart_game' }));
    }
    
    gameActive = true;
    animationRunning = true;
    animate();
    
    if (isMobile) {
        document.getElementById('mobile-lock-hint').style.display = 'block';
    }
    document.body.requestPointerLock();
}
